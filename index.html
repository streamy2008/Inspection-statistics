<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>医疗耗材智能终端</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #8E8E93;
            --border-radius: 24px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #E5E5EA;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #FAFAFA;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #FFF;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:active {
            opacity: 0.8;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        .stat-box {
            background: #F2F2F7;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .progress-container {
            background: #E5E5EA;
            border-radius: 8px;
            height: 12px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
        .sn-list {
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #E5E5EA;
            padding-top: 16px;
        }
        .sn-item {
            font-family: monospace;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid #F2F2F7;
        }
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 模块 1：基础 UI 与离线配网 -->
        <div class="card">
            <h2>医院概况</h2>
            <div class="form-group">
                <label>医院名称 (必填)</label>
                <input type="text" id="hospitalName" placeholder="例如：市第一人民医院">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>手术间总数 (必填）</label>
                    <input type="number" id="totalOrs" placeholder="例如：20">
                </div>
                <div class="form-group">
                    <label>有效使用间数 (必填）</label>
                    <input type="number" id="effectiveOrs" placeholder="例如：15">
                </div>
            </div>
            <div class="form-group">
                <label>当前采集房间号</label>
                <input type="text" id="roomNumber" placeholder="例如：OR-01">
            </div>
        </div>

        <div class="card">
            <h2>中继器热点配置</h2>
            <div class="form-group">
                <label>手机热点名称 (SSID)</label>
                <input type="text" id="ssid" placeholder="请输入热点名称">
            </div>
            <div class="form-group">
                <label>热点密码</label>
                <input type="text" id="password" placeholder="请输入热点密码">
            </div>
            <button id="btnGenerateQR" class="btn btn-primary">生成配网二维码</button>
            <div id="qrcode"></div>
        </div>

        <!-- 模块 2：计费算法与商业预测 -->
        <div class="card">
            <h2>巡检记录</h2>
            <button id="btnFetchData" class="btn btn-primary" style="background-color: #34C759; margin-bottom: 20px;">拉取设备数据</button>
            
            <div id="resultArea" style="display: none;">
                <div class="grid-2" style="margin-bottom: 20px;">
                    <div class="stat-box">
                        <div class="stat-value" id="valN">0</div>
                        <div class="stat-label">当前房间有效 SN 数 (N)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="valTotal">0</div>
                        <div class="stat-label">医院30天有效SN数</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label style="display: flex; justify-content: space-between;">
                        <span>渗透率分析 (拓展潜力)</span>
                        <span id="penetrationText">0%</span>
                    </label>
                    <div class="progress-container">
                        <div class="progress-bar" id="penetrationBar"></div>
                    </div>
                </div>

                <div class="sn-list" id="snList">
                    <!-- SN 列表动态插入 -->
                </div>
            </div>
        </div>

        <!-- 模块 3：离线暂存与同步 -->
        <div class="card">
            <h2>数据存储</h2>
            <button id="btnReport" class="btn btn-primary" style="background-color: #FF9500;">数据存储</button>
        </div>

        <!-- 底部全局网络状态指示器 -->
        <div style="text-align: center; padding: 10px 0 30px 0; font-size: 14px; color: var(--text-secondary);">
            <span id="networkStatus" style="font-weight: 500;">网络状态检查中...</span> 
            <span style="margin: 0 8px;">|</span> 
            待同步队列: <span id="queueCount" style="font-weight: bold; color: var(--text);">0</span>
        </div>
    </div>

    <div id="toast">提示信息</div>

    <footer style="text-align: center; padding: 20px; font-size: 12px; color: var(--text-secondary);">
        <div>当前版本: v4.0 (取消默认值与自动生成)</div>
        <div style="margin-top: 8px;">
            <button onclick="clearCacheAndReload()" style="background: none; border: none; color: var(--primary); cursor: pointer; text-decoration: underline;">修复异常(清缓存)</button>
        </div>
    </footer>

    <!-- 必须通过 CDN 引入 qrcode.js 进行纯本地离线二维码生成 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="/app.js?v=4"></script>
    <script>
        function clearCacheAndReload() {
            if ('caches' in window) {
                caches.keys().then(names => {
                    for (let name of names) caches.delete(name);
                    alert('缓存已清除，即将刷新页面');
                    window.location.reload(true);
                });
            } else {
                window.location.reload(true);
            }
        }
    </script>
</body>
</html>
