<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>巡检记录</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
        --primary: #007AFF;
        --success: #34C759;
        --bg: #F2F2F7;
        --card: #FFFFFF;
        --text: #1C1C1E;
        --text-muted: #8E8E93;
        --border: #E5E5EA;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    body {
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
    }

    header {
        background: var(--card);
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .status-badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
        background: #E8F5E9;
        color: var(--success);
    }

    main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    @media (min-width: 768px) {
        main {
            grid-template-columns: 320px 1fr;
        }
    }

    .sidebar {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .content-area {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        border: 1px solid var(--border);
    }

    .card-title, h2 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        border-bottom: none;
        padding-bottom: 0;
        margin-top: 0;
    }

    .form-group {
        margin-bottom: 12px;
    }

    label {
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
        color: var(--text-muted);
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 16px;
        background: #F9F9F9;
        outline: none;
        transition: border-color 0.2s;
    }

    input:focus {
        border-color: var(--primary);
    }

    .btn, button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 8px;
    }

    .btn-primary, button {
        background: var(--primary);
        color: white;
    }

    .btn-outline {
        background: white !important;
        color: var(--primary) !important;
        border: 2px solid var(--primary) !important;
    }

    #qrcode {
        display: flex;
        justify-content: center;
        margin-top: 20px;
        background: #eee;
        padding: 10px;
        border: 4px solid white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-radius: 8px;
    }
    
    #qrcode img {
        margin: 0 auto;
    }

    .result-box {
        background: #F9F9F9;
        padding: 16px;
        border-radius: 8px;
        margin-top: 12px;
        border: 1px solid var(--border);
    }

    .sn-list {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 250px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #F9F9F9;
    }

    .sn-list li {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        font-family: monospace;
        font-size: 13px;
        color: var(--text);
    }

    .sn-list li:last-child {
        border-bottom: none;
    }

    footer {
        padding: 12px 24px;
        font-size: 12px;
        color: var(--text-muted);
        background: var(--card);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        margin-top: auto;
    }

    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 12px 24px;
        border-radius: 24px;
        font-size: 14px;
        display: none;
        z-index: 1000;
        white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
      <div style="display: flex; align-items: center; gap: 12px;">
          <div style="background: var(--primary); width: 32px; height: 32px; border-radius: 8px;"></div>
          <h1 style="font-size: 18px; margin: 0;">巡检记录</h1>
      </div>
      <div class="status-badge">
          <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);"></span>
          网络在线
      </div>
  </header>

  <main>
    <div class="sidebar">
      <!-- 模块 1：基础 UI 与配网二维码生成 -->
      <div class="card">
        <h2 class="card-title">基础信息</h2>
        <div class="form-group">
          <label>医院名称 (必填)</label>
          <input type="text" id="hospitalName" placeholder="请输入医院名称">
        </div>
        <div class="form-group">
          <label>手术间号 (必填)</label>
          <input type="text" id="roomNumber" placeholder="请输入手术间号">
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">中继器网络配置</h2>
        <div class="form-group">
          <label>手机热点名称 (SSID)</label>
          <input type="text" id="ssid" placeholder="请输入热点名称">
        </div>
        <div class="form-group">
          <label>热点密码</label>
          <input type="text" id="password" placeholder="请输入热点密码">
        </div>
        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
          <button id="btnScanQR" class="btn btn-outline" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><rect x="7" y="7" width="10" height="10" rx="1"></rect></svg>
            扫码识别
          </button>
          <button id="btnGenerateQR" class="btn btn-primary" style="flex: 2; padding: 12px 0;">生成中继器配网码</button>
        </div>
        <div id="qrcode"></div>
      </div>
    </div>

    <div class="content-area">
      <!-- 模块 2 & 3：设备日志拉取、统计与上报 -->
      <div class="card" style="flex: 1; display: flex; flex-direction: column;">
        <h2 class="card-title">设备数据拉取与统计</h2>
        <button id="btnFetchData" class="btn btn-primary" style="background-color: var(--success);">拉取设备数据</button>
        
        <div id="resultArea" style="display: none; margin-top: 20px;">
          <h3 class="card-title" style="margin-top: 0;">统计结果</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div class="card" style="margin-bottom: 0; border: 1px solid var(--border); box-shadow: none;">
                <div class="card-title" style="margin-bottom: 8px;">有效耗材总数</div>
                <div class="stat-value" id="validCount" style="font-size: 32px; font-weight: 700; color: var(--primary);">0</div>
            </div>
            <div class="card" style="margin-bottom: 0; border: 1px solid var(--border); box-shadow: none;">
                <div class="card-title" style="margin-bottom: 8px;">设备状态</div>
                <div class="stat-value" style="font-size: 24px; color: var(--success); line-height: 38px;">已统计</div>
            </div>
          </div>
          <p style="margin: 16px 0 8px; color: var(--text-muted); font-size: 13px;">有效 SN 号列表：</p>
          <ul id="validSnList" class="sn-list"></ul>
          <button id="btnReport" class="btn btn-primary" style="margin-top: 20px;">上报云端</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
      <div>当前版本: v8.0 (终极防缓存版)</div>
      <div style="display: flex; gap: 12px; align-items: center;">
          <span>IndexedDB 就绪</span>
          <button id="btnClearCache" style="background: none; border: none; color: var(--primary); font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; width: auto; margin: 0;">修复异常(清缓存)</button>
      </div>
  </footer>

  <div id="toast" class="toast">提示信息</div>

  <!-- 扫码模态框 -->
  <div id="scannerModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
    <div style="width: 90%; max-width: 400px; background: #fff; border-radius: 16px; overflow: hidden; position: relative;">
      <div id="reader" style="width: 100%;"></div>
      <button id="btnCloseScanner" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;">&times;</button>
    </div>
    <p style="color: white; margin-top: 20px; font-size: 16px;">请将二维码放入框内</p>
  </div>

  <!-- 引入 html5-qrcode 库用于扫码 -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- 引入极其稳定的 qrcode-generator 库 (纯图片输出，无 Canvas 兼容问题) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <!-- 引入主逻辑脚本，增加版本号强制刷新 -->
  <script src="/app.js?v=8"></script>
</body>
</html>
